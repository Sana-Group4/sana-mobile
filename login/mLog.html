<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sana Mobile Login</title>
  <link rel="stylesheet" href="../login/mLog.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
    <body>
        <div class="container">
            <div class="img-box">
                <img src="sportBoy.jpg" alt="">
            </div>
            <div class="content-box">
                <div class="content">
                    <h2>Login</h2>
                        <form action="">
                            <div class="input-box">
                            <label for="inputUserName">Enter Username</label>
                            <input type="text" placeholder="Username" id="inputUserName">
                        </div>


                        <div class="input-box">
                            <label for="inputPass">Enter Password</label>
                            <input type="text" placeholder="Password" id="inputPass">
                        </div>

                        <div class="input-box">
                            <label for="inputPass"><input type="checkbox">Remember Password</label>
                        </div>
<!-- add arrow when hovering over log in button-->
                        <div class="input-box">
                            <input type="submit" value="Log In">                            
                        </div>

                        <div class="social-media">
                            <i class="fa-brands fa-google"></i>
                            <i class="fa-solid fa-phone"></i>
                            <i class="fa-solid fa-envelope"></i>

                            
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
           
            
    </body>
</html>
